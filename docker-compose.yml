version: '3'

services:

  app:
    build: .
    container_name: persistent-app

    restart: always

    depends_on:
      - redis

    networks:
      - app-network

  redis:
    image: redis:latest

    container_name: redis-server

    restart: always

    volumes:
      - redis-data:/data

    networks:
      - app-network

  nginx:
    image: nginx:latest

    container_name: nginx-proxy

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
